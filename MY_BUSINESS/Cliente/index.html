<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY_BUSINESS -INICIAR SESION</title>
</head>

<body>
    <main>
        <section>
            <header>
                <h1>MY BUSINESS</h1>
                <p>Sistema CONTABLE para pequeños y grandes negocios</p>
            </header>

            <article id="seccion_login">
                <h2>Acceso al Sistema</h2>
                <form id="formulario_login" action="#" method="post">
                    <fieldset>
                        <legend>Datos de Identificación</legend>

                        <label for="usuario_correo">Correo Institucional o usuario:</label>
                        <input type="email" id="usuario_correo" name="usuario_correo" required>

                        <label for="usuario_clave">Contraseña:</label>
                        <input type="password" id="usuario_clave" name="usuario_clave" required>

                        <button type="submit">Ingresar</button>
                    </fieldset>

                </form>
            </article>
            <article id="seccion_primer_uso" style="display:none">
                <h2>Configuración Inicial del Sistema</h2>
                <p>Bienvenido. Crea la cuenta del propietario para comenzar.</p>
                <form id="formulario_primer_uso" action="#" method="post">
                    <fieldset>
                        <legend>Datos del Propietario</legend>

                        <label for="nombre_completo">Nombre Completo:</label>
                        <input type="text" id="nombre_completo" name="nombre_completo" required>

                        <label for="correo_electronico">Correo Electrónico:</label>
                        <input type="email" id="correo_electronico" name="correo_electronico" required>

                        <label for="clave_unica">Contraseña:</label>
                        <input type="password" id="clave_unica" name="clave_unica" required>

                        <button type="submit">Crear cuenta y entrar</button>
                    </fieldset>
                </form>
            </article>

            <nav>
                <ul>
                    <li><a href="#">¿Olvido su contraseña?</a></li>
                    <li><a href="#">Soporte Tecnico</a></li>
                </ul>
            </nav>

        </section>
    </main>

    <script src="login.js"></script>

</body>

</html>
